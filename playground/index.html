<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GLML Playground</title>
  <style>
    body {
      background: #1a1a2e;
      color: #e0e0e0;
      margin: 0;
    }
  </style>
  <link rel="stylesheet" href="/src/style.css" />
  <link rel="icon" href="data:image/png;base64,iVBORw0KGgo=">
  <script defer src="/main.bc.js"></script>
  <script defer type="module" src="/src/main.ts"></script>
</head>

<body>
  <div id="app"></div>
  <header>
    <h3>GLML Playground</h3>
  </header>
  <div class="main-layout">

    <div class="pane glml-pane">

      <div class="pane-header">
        <span>GLML</span>
        <select id="example-select"></select>
        <label class="vim-toggle">
          <input type="checkbox" id="vim-toggle" /> Vim
        </label>
        <button id="compile-btn">Compile</button>
      </div>

      <div id="glml-input"></div>
      <div id="vim-status"></div>
    </div>

    <div class="right-column">

      <div class="webgl-pane">
        <div class="pane-header"><span>WebGL Output</span></div>
        <div class="canvas-container">
          <canvas id="gl-canvas"></canvas>
        </div>
      </div>

      <div class="pane glsl-pane">
        <div class="pane-header"><span>GLSL Output</span></div>
        <div class="textarea-wrapper">
          <div id="glsl-output"></div>
          <p id="error-output"></p>
        </div>
      </div>

    </div>

  </div>
</body>

</html>
