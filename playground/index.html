<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GLML Playground</title>
  <link rel="stylesheet" href="/src/style.css" />
  <script defer src="/main.bc.js"></script>
  <script defer type="module" src="/src/main.ts"></script>
</head>

<body>
  <div id="app"></div>
  <header>
    <h3>GLML Playground</h3>
  </header>
  <div class="canvas-container">
    <canvas id="gl-canvas"></canvas>
  </div>
  <div class="editor-container">
    <div class="pane">
      <div class="pane-header">
        <span>GLML Source</span>
        <select id="example-select"></select>
        <button id="compile-btn">Compile</button>
      </div>
      <textarea id="glml-input" spellcheck="false" autocorrect="off"></textarea>
    </div>
    <div class="pane">
      <div class="pane-header"><span>GLSL Output</span></div>
      <textarea id="glsl-output" readonly spellcheck="false"></textarea>
      <p id="error-output"> </p>
    </div>
  </div>

</body>

</html>
